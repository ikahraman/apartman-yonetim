name: Deploy to Azure

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: dotnet publish src/ApartmanYonetim.Web/ApartmanYonetim.Web.csproj -c Release -o publish_output --nologo

      - name: Zip publish output
        run: cd publish_output && zip -r ../deploy.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: sevgiyonetim
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy.zip
          startup-command: dotnet /home/site/wwwroot/ApartmanYonetim.Web.dll
